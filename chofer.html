<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Pedro Bravin — Reparto</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f0f0;color:#1a1a1a;min-height:100vh;display:flex;flex-direction:column;}

/* TOPBAR - estilo PB */
.topbar{background:#1a1a1a;padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;}
.topbar-brand{display:flex;align-items:center;gap:10px;}
.topbar-pb{width:32px;height:32px;background:#fff;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:#1a1a1a;letter-spacing:-0.5px;}
.topbar-name{font-size:13px;font-weight:700;color:#fff;letter-spacing:0.3px;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.topbar-prog{font-size:12px;color:#888;font-weight:600;}
.btn-out{font-size:11px;color:#888;background:none;border:1px solid #444;border-radius:5px;padding:3px 8px;cursor:pointer;font-family:inherit;}

/* PROGRESS */
.progress-wrap{background:#2a2a2a;padding:0 16px 8px;}
.progress-bar{background:#333;border-radius:99px;height:4px;overflow:hidden;}
.progress-fill{background:#25D366;height:100%;border-radius:99px;transition:width 0.5s ease;}

.container{flex:1;padding:14px 14px 24px;max-width:480px;margin:0 auto;width:100%;}

/* LOADING */
.loading-screen{text-align:center;padding:4rem 1rem;}
.spinner{display:inline-block;width:28px;height:28px;border:3px solid #e5e5e5;border-top-color:#1a1a1a;border-radius:50%;animation:spin 0.7s linear infinite;margin-bottom:10px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* DONE */
.done-screen{display:none;text-align:center;padding:3rem 1rem;}
.done-icon{font-size:56px;margin-bottom:12px;}
.done-title{font-size:22px;font-weight:700;margin-bottom:6px;}
.done-sub{font-size:14px;color:#888;}

/* PARADA CARD */
.parada-header{text-align:center;margin-bottom:10px;}
.parada-counter{font-size:12px;font-weight:700;color:#888;letter-spacing:0.08em;text-transform:uppercase;}
.parada-main{background:#fff;border-radius:16px;padding:18px;margin-bottom:12px;border:1px solid #e5e5e5;}
.parada-loc{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;background:#1a1a1a;color:#fff;margin-bottom:14px;letter-spacing:0.04em;text-transform:uppercase;}
.parada-cliente{font-size:20px;font-weight:700;color:#1a1a1a;margin-bottom:5px;line-height:1.2;}
.parada-material{font-size:13px;color:#666;margin-bottom:14px;line-height:1.5;}
.parada-info-row{display:flex;align-items:center;gap:8px;font-size:14px;padding:10px 12px;background:#f8f8f8;border-radius:10px;margin-bottom:6px;}
.parada-info-row strong{color:#1a1a1a;}

/* BOTONES */
.btn-confirm{width:100%;padding:18px;font-size:18px;font-weight:700;background:#1a1a1a;color:#fff;border:none;border-radius:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;font-family:inherit;-webkit-tap-highlight-color:transparent;margin-bottom:10px;letter-spacing:0.3px;}
.btn-confirm:active{transform:scale(0.97);background:#333;}
.btn-saltear{width:100%;padding:13px;font-size:14px;font-weight:600;background:#FEF3C7;color:#92400E;border:1.5px solid #FDE68A;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit;-webkit-tap-highlight-color:transparent;margin-bottom:8px;}
.btn-saltear:active{transform:scale(0.97);}
.btn-nopudo{width:100%;padding:13px;font-size:14px;font-weight:600;background:#FEE2E2;color:#991B1B;border:1.5px solid #FECACA;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit;-webkit-tap-highlight-color:transparent;}
.btn-nopudo:active{transform:scale(0.97);}

/* WSP */
.wsp-screen{display:none;}
.wsp-card{background:#fff;border-radius:14px;padding:16px;margin-bottom:10px;border-left:4px solid #25D366;}
.wsp-header{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px;}
.wsp-body{font-size:13px;color:#1a1a1a;line-height:1.7;white-space:pre-line;margin-bottom:12px;}
.btn-wsp{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:15px;font-size:16px;font-weight:700;background:#25D366;color:#fff;border:none;border-radius:12px;cursor:pointer;font-family:inherit;text-decoration:none;-webkit-tap-highlight-color:transparent;margin-bottom:8px;}
.btn-wsp:active{transform:scale(0.97);}
.btn-omitir{width:100%;padding:11px;font-size:13px;color:#888;background:none;border:1px solid #e5e5e5;border-radius:10px;cursor:pointer;font-family:inherit;}

/* ANTERIORES */
.ant-section{margin-top:16px;}
.ant-title{font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:8px;}
.ant-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#fff;border-radius:10px;margin-bottom:5px;border:1px solid #f0f0f0;cursor:pointer;}
.ant-item:active{background:#f5f5f5;}
.ant-dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;}
.ant-dot.done{background:#1a1a1a;color:#fff;}
.ant-dot.bad{background:#FEE2E2;color:#991B1B;}
.ant-rev{font-size:10px;color:#1D4ED8;margin-left:auto;font-weight:600;}

/* MODALES */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.55);z-index:200;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal-sheet{background:#fff;border-radius:20px 20px 0 0;padding:24px 20px;width:100%;max-width:480px;}
.modal-title{font-size:17px;font-weight:700;margin-bottom:16px;}
.modal-opt{width:100%;padding:15px;font-size:15px;font-weight:600;border-radius:12px;cursor:pointer;font-family:inherit;margin-bottom:8px;border:1.5px solid #e5e5e5;background:#fafafa;display:flex;align-items:center;gap:12px;-webkit-tap-highlight-color:transparent;}
.modal-opt:active{background:#f0f0f0;}
.modal-cancel{background:none;color:#888;border:none;width:100%;padding:12px;font-size:14px;cursor:pointer;font-family:inherit;margin-top:4px;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">
    <div class="topbar-pb">PB</div>
    <div class="topbar-name">PEDRO BRAVIN S.A</div>
  </div>
  <div class="topbar-right">
    <span class="topbar-prog" id="top-prog"></span>
    <button class="btn-out" onclick="cerrarSesion()">Salir</button>
  </div>
</div>

<div class="progress-wrap">
  <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
</div>

<div class="container">

  <div class="loading-screen" id="loading-screen">
    <div class="spinner"></div>
    <div style="font-size:14px;color:#888;">Cargando tu viaje...</div>
  </div>

  <div id="sin-viaje" style="display:none;text-align:center;padding:3rem 1rem;">
    <div style="font-size:48px;margin-bottom:14px;">📋</div>
    <div style="font-size:18px;font-weight:700;margin-bottom:8px;">Sin viaje asignado</div>
    <div style="font-size:14px;color:#888;">La oficina todavía no publicó tu viaje de hoy.</div>
  </div>

  <div class="done-screen" id="done-screen">
    <div class="done-icon">✅</div>
    <div class="done-title">¡Todas las entregas!</div>
    <div class="done-sub">Podés regresar a El Trébol</div>
  </div>

  <!-- WSP -->
  <div class="wsp-screen" id="wsp-screen">
    <div class="wsp-card">
      <div class="wsp-header" id="wsp-header"></div>
      <div class="wsp-body" id="wsp-body"></div>
      <a id="wsp-link" href="#" target="_blank" class="btn-wsp"><i class="ti ti-brand-whatsapp"></i> Enviar WhatsApp</a>
    </div>
    <button class="btn-omitir" onclick="cerrarWSP()">Omitir y continuar</button>
  </div>

  <!-- PARADA -->
  <div id="parada-screen" style="display:none;">
    <div class="parada-header">
      <div class="parada-counter" id="parada-counter"></div>
    </div>
    <div class="parada-main">
      <div><span class="parada-loc"><i class="ti ti-map-pin"></i> <span id="p-loc"></span></span></div>
      <div class="parada-cliente" id="p-cliente"></div>
      <div class="parada-material" id="p-material"></div>
      <div class="parada-info-row"><i class="ti ti-clock" style="font-size:18px;color:#888;"></i> Llegada estimada: <strong id="p-eta"></strong></div>
      <div class="parada-info-row" id="p-tel-row" style="display:none;"><i class="ti ti-phone" style="font-size:16px;color:#888;"></i> <span id="p-tel"></span></div>
    </div>
    <button class="btn-confirm" onclick="accion('entregado')"><i class="ti ti-circle-check" style="font-size:22px;"></i> CONFIRMAR ENTREGA</button>
    <button class="btn-saltear" onclick="accion('salteado')"><i class="ti ti-arrow-right"></i> Saltear — volver después</button>
    <button class="btn-nopudo" onclick="abrirModalNoEntrega()"><i class="ti ti-x"></i> No se pudo entregar</button>
    <div class="ant-section" id="anteriores"></div>
  </div>

</div>

<!-- Modal no entrega -->
<div class="modal-overlay" id="modal-no">
  <div class="modal-sheet">
    <div class="modal-title">¿Por qué no se pudo entregar?</div>
    <button class="modal-opt" onclick="accion('no_estaba')"><span style="font-size:22px;">🚪</span><div><div>Cliente no estaba</div></div></button>
    <button class="modal-opt" onclick="accion('rechazo_total')"><span style="font-size:22px;">❌</span><div><div>Rechazo total</div></div></button>
    <button class="modal-opt" onclick="accion('rechazo_parcial')"><span style="font-size:22px;">⚠️</span><div><div>Rechazo parcial</div></div></button>
    <button class="modal-cancel" onclick="cerrarModalNo()">Cancelar</button>
  </div>
</div>

<!-- Modal revertir -->
<div class="modal-overlay" id="modal-rev">
  <div class="modal-sheet">
    <div class="modal-title" id="rev-titulo">¿Revertir esta parada?</div>
    <div style="font-size:13px;color:#888;margin-bottom:16px;">La parada vuelve a pendiente y podrás entregarla.</div>
    <button class="modal-opt" style="background:#EFF6FF;color:#1D4ED8;border-color:#BFDBFE;" onclick="confirmarRevertir()"><i class="ti ti-refresh" style="font-size:20px;"></i> Sí, revertir</button>
    <button class="modal-cancel" onclick="cerrarModalRev()">Cancelar</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, get, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyA9KkDU1wFRvfH7sIvXe0XWlT2zMdr2PP4",
  authDomain: "pedro-bravin-tracking.firebaseapp.com",
  databaseURL: "https://pedro-bravin-tracking-default-rtdb.firebaseio.com",
  projectId: "pedro-bravin-tracking",
  storageBucket: "pedro-bravin-tracking.firebasestorage.app",
  messagingSenderId: "220258990649",
  appId: "1:220258990649:web:92db48ae42e7e1743e6be8"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const VOL = {chico:15,mediano:30,grande:45};
let paradas=[], viajeId=null, gpsLink='', hrMeta=null, revertirIdx=null;

function parseMin(t){const[h,m]=t.split(':').map(Number);return h*60+m;}
function addMin(t,m){let x=parseMin(t)+Math.round(m);return String(Math.floor(x/60)%24).padStart(2,'0')+':'+String(x%60).padStart(2,'0');}

window.cerrarSesion=()=>signOut(auth).then(()=>window.location.href='index.html');

onAuthStateChanged(auth, async user=>{
  if(!user){window.location.href='index.html';return;}
  await cargarViaje(user.uid);
});

async function cargarViaje(uid){
  try{
    const asig=await get(ref(db,'asignaciones/'+uid));
    if(!asig.exists()){showSinViaje();return;}
    viajeId=asig.val().viajeId;
    const snap=await get(ref(db,'viajes/'+viajeId));
    if(!snap.exists()){showSinViaje();return;}
    const hr=snap.val();
    hrMeta={horaSalida:hr.horaSalida,tiempoZona:hr.tiempoZona};
    paradas=hr.paradas||[];
    gpsLink=hr.gpsLink||'';
    document.getElementById('loading-screen').style.display='none';
    render();
  }catch(e){showSinViaje();}
}

function showSinViaje(){
  document.getElementById('loading-screen').style.display='none';
  document.getElementById('sin-viaje').style.display='block';
}

function calcETAs(){
  if(!hrMeta)return[];
  let c=addMin(hrMeta.horaSalida,hrMeta.tiempoZona);
  return paradas.map((p,i)=>{const eta=c;c=addMin(c,(VOL[p.vol]||30)+(i<paradas.length-1?12:0));return eta;});
}

function getSig(){return paradas.findIndex(p=>p.estado==='pendiente');}

function render(){
  const etas=calcETAs();
  const sig=getSig();
  const ent=paradas.filter(p=>p.estado==='entregado').length;
  const pct=Math.round(ent/paradas.length*100);
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('top-prog').textContent=ent+'/'+paradas.length;

  if(sig===-1){
    document.getElementById('parada-screen').style.display='none';
    document.getElementById('done-screen').style.display='block';
    return;
  }

  const p=paradas[sig];
  document.getElementById('parada-screen').style.display='block';
  document.getElementById('done-screen').style.display='none';
  document.getElementById('parada-counter').textContent='PARADA '+(sig+1)+' DE '+paradas.length;
  document.getElementById('p-loc').textContent=p.localidad;
  document.getElementById('p-cliente').textContent=p.cliente;
  document.getElementById('p-material').textContent=p.material;
  document.getElementById('p-eta').textContent=(p.eta||etas[sig]||'—')+' hs';

  if(p.tel){document.getElementById('p-tel-row').style.display='flex';document.getElementById('p-tel').textContent=p.tel;}
  else document.getElementById('p-tel-row').style.display='none';

  const ant=document.getElementById('anteriores');
  const proc=paradas.filter(p=>p.estado!=='pendiente');
  const etxto=e=>({entregado:'Entregado',salteado:'Salteado',no_estaba:'No estaba',rechazo_total:'Rechazo total',rechazo_parcial:'Rechazo parcial'})[e]||e;
  if(proc.length>0){
    ant.innerHTML='<div class="ant-title">Tocá para revertir</div>'+
      paradas.map((p,i)=>p.estado!=='pendiente'?
        `<div class="ant-item" onclick="abrirRevertir(${i})">
          <div class="ant-dot ${p.estado==='entregado'?'done':'bad'}">${p.estado==='entregado'?'✓':'!'}</div>
          <div style="flex:1;min-width:0;"><div style="font-size:13px;font-weight:600;">${p.cliente}</div><div style="font-size:11px;color:#aaa;">${etxto(p.estado)}</div></div>
          <span class="ant-rev"><i class="ti ti-refresh"></i> Revertir</span>
        </div>`:''
      ).join('');
  } else ant.innerHTML='';
}

async function guardarEstado(idx,estado){
  paradas[idx].estado=estado;
  await update(ref(db,'viajes/'+viajeId+'/paradas/'+idx),{estado});
}

window.accion=async function(tipo){
  cerrarModalNo();
  const sig=getSig();if(sig===-1)return;
  await guardarEstado(sig,tipo);
  const etas=calcETAs();
  const prox=getSig();
  const ent=paradas.filter(p=>p.estado==='entregado').length;
  if(tipo==='entregado'&&prox!==-1){
    const pp=paradas[prox];
    if(pp.tel){
      const rest=paradas.slice(prox).filter(p=>p.estado==='pendiente').length-1;
      const gps=gpsLink?`\n\n📍 Seguí el camión en vivo:\n${gpsLink}`:'';
      const txt=`🚛 *Pedro Bravin S.A* — Tu pedido está en camino.\n\n${rest>0?`Quedan ${rest} entrega${rest>1?'s':''} antes que vos.`:`Somos tu próxima entrega.`}\n⏱ Hora estimada: *${pp.eta||etas[prox]} hs*${gps}\n\nAnte cualquier consulta comunicate con nosotros.`;
      document.getElementById('wsp-header').textContent='Avisá a '+pp.cliente;
      document.getElementById('wsp-body').textContent=txt;
      document.getElementById('wsp-link').href='https://wa.me/'+pp.tel+'?text='+encodeURIComponent(txt);
      document.getElementById('wsp-screen').style.display='block';
      document.getElementById('parada-screen').style.display='none';
      return;
    }
  }
  render();
};

window.cerrarWSP=function(){
  document.getElementById('wsp-screen').style.display='none';
  render();
};
document.getElementById('wsp-link').addEventListener('click',()=>{setTimeout(()=>{document.getElementById('wsp-screen').style.display='none';render();},800);});

window.abrirModalNoEntrega=()=>document.getElementById('modal-no').classList.add('open');
window.cerrarModalNo=()=>document.getElementById('modal-no').classList.remove('open');

window.abrirRevertir=function(idx){
  revertirIdx=idx;
  document.getElementById('rev-titulo').textContent='¿Revertir a '+paradas[idx].cliente+'?';
  document.getElementById('modal-rev').classList.add('open');
};
window.cerrarModalRev=()=>document.getElementById('modal-rev').classList.remove('open');
window.confirmarRevertir=async function(){
  if(revertirIdx===null)return;
  await guardarEstado(revertirIdx,'pendiente');
  cerrarModalRev();render();
};
</script>
</body>
</html>
