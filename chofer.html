<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Pedro Bravin — Reparto</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f4f8;color:#1a1a1a;min-height:100vh;display:flex;flex-direction:column;}
.topbar{background:#1a1a1a;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
.topbar-logo{font-size:14px;font-weight:600;color:#fff;}
.topbar-prog{font-size:12px;color:#888;}
.container{flex:1;padding:16px;max-width:480px;margin:0 auto;width:100%;}
.progress-bar{background:#e5e5e5;border-radius:99px;height:5px;margin-bottom:20px;overflow:hidden;}
.progress-fill{background:#16a34a;height:100%;border-radius:99px;transition:width 0.4s;}
.loading-screen{text-align:center;padding:3rem 1rem;}
.spinner{display:inline-block;width:32px;height:32px;border:3px solid #e5e5e5;border-top-color:#1a1a1a;border-radius:50%;animation:spin 0.7s linear infinite;margin-bottom:12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.done-screen{display:none;text-align:center;padding:3rem 1rem;}
.done-icon{font-size:64px;margin-bottom:16px;}
.done-title{font-size:24px;font-weight:700;margin-bottom:8px;}
.done-sub{font-size:15px;color:#888;}
.parada-num{font-size:13px;color:#888;margin-bottom:8px;text-align:center;font-weight:500;}
.parada-card{background:#fff;border-radius:16px;padding:20px;margin-bottom:14px;border:1px solid #e5e5e5;}
.parada-localidad{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;background:#EFF6FF;color:#1D4ED8;margin-bottom:14px;}
.parada-cliente{font-size:22px;font-weight:700;color:#1a1a1a;margin-bottom:6px;line-height:1.2;}
.parada-material{font-size:14px;color:#666;margin-bottom:14px;line-height:1.4;}
.parada-eta{display:flex;align-items:center;gap:8px;font-size:15px;padding:10px;background:#f8f8f8;border-radius:10px;margin-bottom:8px;}
.parada-tel{display:flex;align-items:center;gap:8px;font-size:14px;color:#666;padding:8px 10px;background:#f8f8f8;border-radius:10px;}
.btn-confirmar{width:100%;padding:18px;font-size:19px;font-weight:700;background:#16a34a;color:#fff;border:none;border-radius:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;font-family:inherit;-webkit-tap-highlight-color:transparent;margin-bottom:10px;}
.btn-confirmar:active{transform:scale(0.97);background:#15803d;}
.btn-saltear{width:100%;padding:13px;font-size:15px;font-weight:600;background:#FEF3C7;color:#92400E;border:1px solid #FDE68A;border-radius:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit;-webkit-tap-highlight-color:transparent;margin-bottom:8px;}
.btn-saltear:active{transform:scale(0.97);}
.btn-no-entregado{width:100%;padding:13px;font-size:15px;font-weight:600;background:#FEE2E2;color:#991B1B;border:1px solid #FECACA;border-radius:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit;-webkit-tap-highlight-color:transparent;}
.btn-no-entregado:active{transform:scale(0.97);}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:200;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal-card{background:#fff;border-radius:20px 20px 0 0;padding:24px;width:100%;max-width:480px;}
.modal-title{font-size:17px;font-weight:700;margin-bottom:16px;}
.modal-btn{width:100%;padding:14px;font-size:15px;font-weight:600;border-radius:12px;cursor:pointer;font-family:inherit;margin-bottom:8px;border:1px solid #e5e5e5;background:#fafafa;display:flex;align-items:center;gap:10px;-webkit-tap-highlight-color:transparent;}
.modal-btn:active{background:#f0f0f0;}
.modal-cancel{background:none;color:#888;border:none;width:100%;padding:12px;font-size:14px;cursor:pointer;font-family:inherit;margin-top:4px;}
.wsp-card{background:#f0fdf4;border-radius:12px;padding:14px;margin-bottom:12px;border-left:3px solid #25D366;}
.wsp-label{font-size:11px;color:#888;margin-bottom:6px;}
.wsp-msg{font-size:13px;color:#1a1a1a;line-height:1.6;white-space:pre-line;margin-bottom:10px;}
.btn-wsp{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;font-size:16px;font-weight:600;background:#25D366;color:#fff;border:none;border-radius:12px;cursor:pointer;font-family:inherit;text-decoration:none;-webkit-tap-highlight-color:transparent;}
.btn-wsp:active{transform:scale(0.97);}
.btn-skip-wsp{width:100%;padding:12px;font-size:14px;color:#888;background:none;border:1px solid #e5e5e5;border-radius:12px;cursor:pointer;font-family:inherit;margin-top:8px;}
.anteriores{margin-top:16px;}
.ant-title{font-size:11px;color:#aaa;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.05em;}
.ant-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#fff;border-radius:10px;margin-bottom:6px;border:1px solid #f0f0f0;}
.ant-dot{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;}
.ant-dot.done{background:#D1FAE5;color:#065F46;}
.ant-dot.skip{background:#FEE2E2;color:#991B1B;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">Pedro Bravin S.A</div>
  <div class="topbar-prog" id="top-prog"></div>
</div>

<div class="container">
  <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>

  <!-- Loading -->
  <div class="loading-screen" id="loading-screen">
    <div class="spinner"></div>
    <div style="font-size:14px;color:#888;">Cargando hoja de ruta...</div>
  </div>

  <!-- Error -->
  <div id="error-screen" style="display:none;text-align:center;padding:3rem 1rem;">
    <div style="font-size:40px;margin-bottom:16px;">🔗</div>
    <div style="font-size:18px;font-weight:600;margin-bottom:8px;">Link inválido</div>
    <div style="font-size:14px;color:#888;">Pedí el link correcto a la oficina.</div>
  </div>

  <!-- Completado -->
  <div class="done-screen" id="done-screen">
    <div class="done-icon">✅</div>
    <div class="done-title">Todas las entregas listas</div>
    <div class="done-sub">Podés regresar a El Trébol</div>
  </div>

  <!-- WSP -->
  <div id="wsp-area" style="display:none;">
    <div class="wsp-card">
      <div class="wsp-label" id="wsp-label"></div>
      <div class="wsp-msg" id="wsp-msg"></div>
      <a id="wsp-btn" href="#" target="_blank" class="btn-wsp"><i class="ti ti-brand-whatsapp"></i> Enviar WhatsApp</a>
    </div>
    <button class="btn-skip-wsp" onclick="cerrarWSP()">Omitir y continuar</button>
  </div>

  <!-- Parada actual -->
  <div id="parada-screen" style="display:none;">
    <div class="parada-num" id="parada-num"></div>
    <div class="parada-card">
      <div><span class="parada-localidad"><i class="ti ti-map-pin"></i> <span id="p-loc"></span></span></div>
      <div class="parada-cliente" id="p-cliente"></div>
      <div class="parada-material" id="p-material"></div>
      <div class="parada-eta"><i class="ti ti-clock" style="font-size:18px;color:#888;"></i> Llegada estimada: <strong id="p-eta"></strong></div>
      <div class="parada-tel" id="p-tel-row" style="display:none;"><i class="ti ti-phone" style="font-size:16px;color:#888;"></i> <span id="p-tel"></span></div>
    </div>
    <button class="btn-confirmar" onclick="accion('entregado')"><i class="ti ti-circle-check" style="font-size:22px;"></i> CONFIRMAR ENTREGA</button>
    <button class="btn-saltear" onclick="accion('salteado')"><i class="ti ti-arrow-right"></i> Saltear — volver después</button>
    <button class="btn-no-entregado" onclick="mostrarModalNoEntrega()"><i class="ti ti-x"></i> No se pudo entregar</button>
    <div class="anteriores" id="anteriores"></div>
  </div>
</div>

<!-- Modal no entrega -->
<div class="modal-overlay" id="modal-no-entrega">
  <div class="modal-card">
    <div class="modal-title">¿Por qué no se pudo entregar?</div>
    <button class="modal-btn" onclick="accion('no_estaba')"><span style="font-size:20px;">🚪</span> Cliente no estaba</button>
    <button class="modal-btn" onclick="accion('rechazo_total')"><span style="font-size:20px;">❌</span> Rechazo total</button>
    <button class="modal-btn" onclick="accion('rechazo_parcial')"><span style="font-size:20px;">⚠️</span> Rechazo parcial</button>
    <button class="modal-cancel" onclick="cerrarModal()">Cancelar</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyA9KkDU1wFRvfH7sIvXe0XWlT2zMdr2PP4",
  authDomain: "pedro-bravin-tracking.firebaseapp.com",
  databaseURL: "https://pedro-bravin-tracking-default-rtdb.firebaseio.com",
  projectId: "pedro-bravin-tracking",
  storageBucket: "pedro-bravin-tracking.firebasestorage.app",
  messagingSenderId: "220258990649",
  appId: "1:220258990649:web:92db48ae42e7e1743e6be8"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const VOL_TIEMPO = {chico:15, mediano:30, grande:45};
let paradas = [];
let hrId = null;
let gpsLink = '';
let hrMeta = null;

function parseMin(t){ const [h,m] = t.split(':').map(Number); return h*60+m; }
function addMin(t, m){ let x = parseMin(t)+Math.round(m); return String(Math.floor(x/60)%24).padStart(2,'0')+':'+String(x%60).padStart(2,'0'); }

function calcETAs(){
  if (!hrMeta) return [];
  let c = addMin(hrMeta.horaSalida, hrMeta.tiempoZona);
  return paradas.map((p,i) => {
    const eta = c;
    c = addMin(c, (VOL_TIEMPO[p.vol]||30) + (i < paradas.length-1 ? 12 : 0));
    return eta;
  });
}

async function init(){
  const params = new URLSearchParams(window.location.search);
  hrId = params.get('hr');
  if (!hrId){ showError(); return; }
  try {
    const snap = await get(ref(db, 'hojas/' + hrId));
    if (!snap.exists()){ showError(); return; }
    const hr = snap.val();
    hrMeta = { horaSalida: hr.horaSalida, tiempoZona: hr.tiempoZona };
    paradas = hr.paradas || [];
    gpsLink = hr.gpsLink || '';
    document.getElementById('loading-screen').style.display = 'none';
    render();
  } catch(e){ showError(); }
}

function showError(){
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('error-screen').style.display = 'block';
}

function getSiguiente(){ return paradas.findIndex(p => p.estado === 'pendiente'); }

function render(){
  const etas = calcETAs();
  const siguiente = getSiguiente();
  const noTerminados = paradas.filter(p => p.estado !== 'entregado' && p.estado !== 'no_estaba' && p.estado !== 'rechazo_total' && p.estado !== 'rechazo_parcial').length;
  const entregados = paradas.filter(p => p.estado === 'entregado').length;
  const pct = Math.round((entregados / paradas.length) * 100);

  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('top-prog').textContent = entregados + '/' + paradas.length;

  if (siguiente === -1){
    document.getElementById('parada-screen').style.display = 'none';
    document.getElementById('done-screen').style.display = 'block';
    return;
  }

  const p = paradas[siguiente];
  document.getElementById('parada-screen').style.display = 'block';
  document.getElementById('done-screen').style.display = 'none';
  document.getElementById('parada-num').textContent = 'PARADA ' + (siguiente+1) + ' DE ' + paradas.length;
  document.getElementById('p-loc').textContent = p.localidad;
  document.getElementById('p-cliente').textContent = p.cliente;
  document.getElementById('p-material').textContent = p.material;
  document.getElementById('p-eta').textContent = (p.eta || etas[siguiente] || '—') + ' hs';

  if (p.tel){
    document.getElementById('p-tel-row').style.display = 'flex';
    document.getElementById('p-tel').textContent = p.tel;
  } else {
    document.getElementById('p-tel-row').style.display = 'none';
  }

  const ant = document.getElementById('anteriores');
  const procesados = paradas.filter(p => p.estado !== 'pendiente');
  if (procesados.length > 0){
    ant.innerHTML = '<div class="ant-title">Procesadas</div>' +
      paradas.map(p => p.estado !== 'pendiente' ?
        `<div class="ant-item">
          <div class="ant-dot ${p.estado==='entregado'?'done':'skip'}">${p.estado==='entregado'?'✓':'!'}</div>
          <div style="flex:1;">
            <div style="font-size:13px;font-weight:500;">${p.cliente}</div>
            <div style="font-size:11px;color:#aaa;">${p.estado==='entregado'?'Entregado':p.estado==='salteado'?'Salteado':p.estado==='no_estaba'?'No estaba':p.estado==='rechazo_total'?'Rechazo total':'Rechazo parcial'}</div>
          </div>
        </div>` : ''
      ).join('');
  } else {
    ant.innerHTML = '';
  }
}

async function guardarEstado(idx, nuevoEstado){
  paradas[idx].estado = nuevoEstado;
  await update(ref(db, 'hojas/' + hrId + '/paradas/' + idx), { estado: nuevoEstado });
}

window.accion = async function(tipo){
  cerrarModal();
  const siguiente = getSiguiente();
  if (siguiente === -1) return;
  await guardarEstado(siguiente, tipo);

  const etas = calcETAs();
  const proximoIdx = getSiguiente();
  const entregados = paradas.filter(p=>p.estado==='entregado').length;

  if (tipo === 'entregado' && proximoIdx !== -1){
    const prox = paradas[proximoIdx];
    if (prox.tel){
      const restantes = paradas.slice(proximoIdx).filter(p=>p.estado==='pendiente').length - 1;
      const gpsLine = gpsLink ? `\n\n📍 Seguí el camión en vivo:\n${gpsLink}` : '';
      const txt = `🚛 *Pedro Bravin S.A* — Tu pedido está en camino.\n\n${restantes>0?`Quedan ${restantes} entrega${restantes>1?'s':''} antes que vos.`:`Somos tu próxima entrega.`}\n⏱ Hora estimada: *${prox.eta || etas[proximoIdx]} hs*${gpsLine}\n\nAnte cualquier consulta comunicate con nosotros.`;
      document.getElementById('wsp-label').textContent = 'Avisá a ' + prox.cliente;
      document.getElementById('wsp-msg').textContent = txt;
      document.getElementById('wsp-btn').href = 'https://wa.me/' + prox.tel + '?text=' + encodeURIComponent(txt);
      document.getElementById('wsp-area').style.display = 'block';
      document.getElementById('parada-screen').style.display = 'none';
      return;
    }
  }
  render();
};

window.cerrarWSP = function(){
  document.getElementById('wsp-area').style.display = 'none';
  render();
};

document.getElementById('wsp-btn').addEventListener('click', () => {
  setTimeout(() => { document.getElementById('wsp-area').style.display='none'; render(); }, 800);
});

window.mostrarModalNoEntrega = () => document.getElementById('modal-no-entrega').classList.add('open');
window.cerrarModal = () => document.getElementById('modal-no-entrega').classList.remove('open');

init();
</script>
</body>
</html>
