<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Pedro Bravin — Reparto</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f4f8;color:#1a1a1a;min-height:100vh;display:flex;flex-direction:column;}
.topbar{background:#1a1a1a;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
.topbar-logo{font-size:14px;font-weight:600;color:#fff;}
.topbar-prog{font-size:12px;color:#888;}
.container{flex:1;padding:16px;max-width:480px;margin:0 auto;width:100%;}

/* ESTADO COMPLETADO */
.done-screen{display:none;text-align:center;padding:3rem 1rem;}
.done-icon{font-size:64px;margin-bottom:16px;}
.done-title{font-size:24px;font-weight:700;margin-bottom:8px;}
.done-sub{font-size:15px;color:#888;}

/* PARADA ACTUAL */
.parada-num{font-size:13px;color:#888;margin-bottom:8px;text-align:center;}
.parada-card{background:#fff;border-radius:16px;padding:24px;margin-bottom:16px;border:1px solid #e5e5e5;}
.parada-localidad{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;background:#EFF6FF;color:#1D4ED8;margin-bottom:16px;}
.parada-cliente{font-size:22px;font-weight:700;color:#1a1a1a;margin-bottom:6px;line-height:1.2;}
.parada-material{font-size:14px;color:#666;margin-bottom:16px;line-height:1.4;}
.parada-eta{display:flex;align-items:center;gap:8px;font-size:15px;color:#1a1a1a;padding:12px;background:#f8f8f8;border-radius:10px;}
.parada-tel{display:flex;align-items:center;gap:8px;font-size:14px;color:#666;margin-top:10px;padding:10px 12px;background:#f8f8f8;border-radius:10px;}

/* BOTÓN CONFIRMAR */
.btn-confirmar{width:100%;padding:20px;font-size:20px;font-weight:700;background:#16a34a;color:#fff;border:none;border-radius:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;font-family:inherit;letter-spacing:0.3px;-webkit-tap-highlight-color:transparent;}
.btn-confirmar:active{transform:scale(0.97);background:#15803d;}

/* WSP */
.wsp-card{background:#f0fdf4;border-radius:12px;padding:14px;margin-bottom:12px;border-left:3px solid #25D366;}
.wsp-label{font-size:11px;color:#888;margin-bottom:6px;}
.wsp-msg{font-size:13px;color:#1a1a1a;line-height:1.6;white-space:pre-line;margin-bottom:10px;}
.btn-wsp{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;font-size:16px;font-weight:600;background:#25D366;color:#fff;border:none;border-radius:12px;cursor:pointer;font-family:inherit;text-decoration:none;-webkit-tap-highlight-color:transparent;}
.btn-wsp:active{transform:scale(0.97);}
.btn-skip{width:100%;padding:12px;font-size:14px;color:#888;background:none;border:1px solid #e5e5e5;border-radius:12px;cursor:pointer;font-family:inherit;margin-top:8px;-webkit-tap-highlight-color:transparent;}

/* PROGRESO */
.progress-bar{background:#e5e5e5;border-radius:99px;height:4px;margin-bottom:20px;overflow:hidden;}
.progress-fill{background:#1a1a1a;height:100%;border-radius:99px;transition:width 0.4s ease;}

/* ANTERIORES */
.anteriores{margin-top:16px;}
.ant-title{font-size:12px;color:#aaa;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.05em;}
.ant-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#fff;border-radius:10px;margin-bottom:6px;border:1px solid #f0f0f0;}
.ant-check{width:22px;height:22px;border-radius:50%;background:#D1FAE5;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;color:#065F46;}
.ant-name{font-size:13px;font-weight:500;color:#888;}
.ant-loc{font-size:11px;color:#aaa;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">Pedro Bravin S.A</div>
  <div class="topbar-prog" id="top-prog"></div>
</div>

<div class="container">
  <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>

  <!-- Pantalla completado -->
  <div class="done-screen" id="done-screen">
    <div class="done-icon">✅</div>
    <div class="done-title">Todas las entregas listas</div>
    <div class="done-sub">Podés regresar a El Trébol</div>
  </div>

  <!-- WSP pendiente de enviar -->
  <div id="wsp-area" style="display:none;">
    <div class="wsp-card">
      <div class="wsp-label" id="wsp-label"></div>
      <div class="wsp-msg" id="wsp-msg"></div>
      <a id="wsp-btn" href="#" target="_blank" class="btn-wsp"><i class="ti ti-brand-whatsapp"></i> Enviar WhatsApp</a>
    </div>
    <button class="btn-skip" onclick="cerrarWSP()">Omitir y continuar</button>
  </div>

  <!-- Parada actual -->
  <div id="parada-screen">
    <div class="parada-num" id="parada-num"></div>
    <div class="parada-card">
      <div><span class="parada-localidad"><i class="ti ti-map-pin"></i> <span id="p-loc"></span></span></div>
      <div class="parada-cliente" id="p-cliente"></div>
      <div class="parada-material" id="p-material"></div>
      <div class="parada-eta"><i class="ti ti-clock" style="font-size:18px;color:#888;"></i> Llegada estimada: <strong id="p-eta"></strong></div>
      <div class="parada-tel" id="p-tel-row" style="display:none;"><i class="ti ti-phone" style="font-size:16px;color:#888;"></i> <span id="p-tel"></span></div>
    </div>
    <button class="btn-confirmar" onclick="confirmar()">
      <i class="ti ti-circle-check" style="font-size:24px;"></i> CONFIRMAR ENTREGA
    </button>
    <div class="anteriores" id="anteriores"></div>
  </div>
</div>

<script>
let paradas = [];
let estado = [];
let gpsLink = '';
let hrData = null;

function parseMin(t){const[h,m]=t.split(':').map(Number);return h*60+m;}
function addMin(t,m){let x=parseMin(t)+Math.round(m);return String(Math.floor(x/60)%24).padStart(2,'0')+':'+String(x%60).padStart(2,'0');}
const VOL_TIEMPO={chico:15,mediano:30,grande:45};

function calcETAs(){
  if(!hrData)return[];
  let c=addMin(hrData.horaSalida, hrData.tiempoZona);
  return paradas.map((p,i)=>{
    const eta=c;
    c=addMin(c,(VOL_TIEMPO[p.vol]||30)+(i<paradas.length-1?12:0));
    return eta;
  });
}

function cargarDesdeURL(){
  try{
    const params=new URLSearchParams(window.location.search);
    const data=params.get('d');
    if(!data)return false;
    hrData=JSON.parse(atob(decodeURIComponent(data)));
    paradas=hrData.paradas;
    estado=hrData.estado||paradas.map(()=>'pendiente');
    gpsLink=hrData.gpsLink||'';
    return true;
  }catch(e){return false;}
}

function guardarEnURL(){
  hrData.estado=estado;
  const encoded=encodeURIComponent(btoa(JSON.stringify(hrData)));
  const newURL=window.location.pathname+'?d='+encoded;
  window.history.replaceState(null,'',newURL);
}

function render(){
  const etas=calcETAs();
  const siguiente=estado.findIndex(e=>e==='pendiente');
  const entregados=estado.filter(e=>e==='entregado').length;
  const pct=Math.round((entregados/paradas.length)*100);

  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('top-prog').textContent=entregados+'/'+paradas.length+' entregas';

  if(siguiente===-1){
    document.getElementById('parada-screen').style.display='none';
    document.getElementById('done-screen').style.display='block';
    return;
  }

  const p=paradas[siguiente];
  document.getElementById('parada-num').textContent='PARADA '+(siguiente+1)+' DE '+paradas.length;
  document.getElementById('p-loc').textContent=p.localidad;
  document.getElementById('p-cliente').textContent=p.cliente;
  document.getElementById('p-material').textContent=p.material;
  document.getElementById('p-eta').textContent=etas[siguiente]+' hs';

  if(p.tel){
    document.getElementById('p-tel-row').style.display='flex';
    document.getElementById('p-tel').textContent=p.tel;
  } else {
    document.getElementById('p-tel-row').style.display='none';
  }

  // Anteriores
  const ant=document.getElementById('anteriores');
  const entregadosList=paradas.filter((_,i)=>estado[i]==='entregado');
  if(entregadosList.length>0){
    ant.innerHTML='<div class="ant-title">Completadas</div>'+
      paradas.map((p,i)=>estado[i]==='entregado'?
        `<div class="ant-item"><div class="ant-check"><i class="ti ti-check"></i></div><div><div class="ant-name">${p.cliente}</div><div class="ant-loc">${p.localidad}</div></div></div>`:''
      ).join('');
  } else {
    ant.innerHTML='';
  }
}

function confirmar(){
  const siguiente=estado.findIndex(e=>e==='pendiente');
  if(siguiente===-1)return;
  estado[siguiente]='entregado';
  guardarEnURL();

  const etas=calcETAs();
  const proximoIdx=estado.findIndex(e=>e==='pendiente');
  const entregados=estado.filter(e=>e==='entregado').length;

  if(proximoIdx!==-1){
    const prox=paradas[proximoIdx];
    if(prox.tel){
      const restantes=Math.max(0,proximoIdx-entregados);
      const gpsLine=gpsLink?`\n\n📍 Seguí el camión en vivo:\n${gpsLink}`:'';
      const txt=`🚛 *Pedro Bravin S.A* — Tu pedido está en camino.\n\n${restantes>0?`Quedan ${restantes} entrega${restantes>1?'s':''} antes que vos.`:`Somos tu próxima entrega.`}\n⏱ Hora estimada de llegada: *${etas[proximoIdx]} hs*${gpsLine}\n\nAnte cualquier consulta comunicate con nosotros.`;
      document.getElementById('wsp-label').textContent='Avisá a '+prox.cliente;
      document.getElementById('wsp-msg').textContent=txt;
      document.getElementById('wsp-btn').href='https://wa.me/'+prox.tel+'?text='+encodeURIComponent(txt);
      document.getElementById('wsp-area').style.display='block';
      document.getElementById('parada-screen').style.display='none';
      return;
    }
  }
  render();
}

function cerrarWSP(){
  document.getElementById('wsp-area').style.display='none';
  document.getElementById('parada-screen').style.display='block';
  render();
}

document.getElementById('wsp-btn').addEventListener('click',()=>{
  setTimeout(()=>{
    document.getElementById('wsp-area').style.display='none';
    document.getElementById('parada-screen').style.display='block';
    render();
  }, 1000);
});

if(cargarDesdeURL()){
  render();
} else {
  document.getElementById('parada-screen').innerHTML='<div style="text-align:center;padding:3rem 1rem;"><div style="font-size:40px;margin-bottom:16px;">🔗</div><div style="font-size:18px;font-weight:600;margin-bottom:8px;">Link inválido</div><div style="font-size:14px;color:#888;">Este link fue generado por oficina. Pedí el link correcto.</div></div>';
}
</script>
</body>
</html>
